# Fly.io config for the Focus3 Express backend.
# Run from repo root: `fly launch --copy-config --no-deploy` to create the app,
# then `fly secrets set ANTHROPIC_API_KEY=... GOOGLE_CLIENT_ID=... ...` and `fly deploy`.

app = "focus3-backend"
primary_region = "lhr"

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8787"
  NODE_ENV = "production"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/api/health"
